  <script>
    (function() {
      // Use event delegation on the document body to ensure it always fires regardless of load order
      document.body.addEventListener('click', function(e) {
        const folder = e.target.closest('.more-work .mw-folder');
        if (!folder) return;

        // Check if on mobile breakpoint OR touch device
        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        if (window.innerWidth <= 1024 || isTouch) {
          if (!folder.classList.contains('is-open')) {
            e.preventDefault(); // Stop navigation on first tap
            
            // Close any other open folders
            document.querySelectorAll('.more-work .mw-folder.is-open').forEach(f => {
              f.classList.remove('is-open', 'pulse-white');
            });
            
            // Open this folder and start pulsing
            folder.classList.add('is-open', 'pulse-white');
          }
        }
      });
    })();
  </script>
