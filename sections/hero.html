<section class="hero" id="hero">
  <p class="hero__bg-type hero__bg-type--tr" aria-hidden="true"><span id="hero-bg-type-a"></span><span class="hero__bg-type-cursor"></span></p>
  <p class="hero__bg-type hero__bg-type--bl" aria-hidden="true"><span id="hero-bg-type-b"></span><span class="hero__bg-type-cursor"></span></p>
  <div class="hero__stage">
    <img class="hero__photo hero__photo--ambient" src="assets/hero/hero-photo-ambient.webp" alt="" aria-hidden="true" width="1800" height="1005" />
    <picture class="hero__wordmark-container reveal">
      <source media="(max-width: 768px)" srcset="assets/hero/wordmark-mobile.svg">
      <img class="hero__wordmark" src="assets/hero/wordmark.svg" alt="Smith Visuals" width="1421" height="472" />
      <span class="hero__rec-dot-mask" aria-hidden="true"></span>
      <span class="hero__rec-dot" aria-hidden="true"></span>
    </picture>
    <img class="hero__photo hero__photo--main" src="assets/hero/hero-photo-main.webp" alt="" aria-hidden="true" fetchpriority="high" width="1807" height="1009" />
  </div>



  <a class="hero__scroll" href="#hero-intro" aria-label="Nach unten scrollen">
    <span class="hero__scroll-label">Scroll</span>
    <svg class="hero__scroll-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <path d="M12 5v14M6 13l6 6 6-6" />
    </svg>
  </a>
</section>
