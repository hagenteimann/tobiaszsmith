<!DOCTYPE html>

  <link rel="stylesheet" href="styles/fonts.css?v=1">
  <link rel="stylesheet" href="styles/tokens.css?v=1">
  <link rel="stylesheet" href="styles/base.css?v=1">
  <link rel="stylesheet" href="styles/portfolio.css?v=1">
  <style>
    body { background: var(--c-bg); color: var(--c-text-light); }
    .project-header {
      padding: var(--space-6) 0 var(--space-4);

      font-weight: 600;

    .project-title {

  <main class="container" style="padding-bottom: var(--space-8);">

      <li class="portfolio__item">
        <video class="portfolio__img portfolio__media" src="assets/projects/Athletik&Fitnessstudio_Reels.2026/HIGHenergySPORT.mp4" muted loop autoplay playsinline loading="lazy"></video>

      </li>
      <li class="portfolio__item">
        <video class="portfolio__img portfolio__media" src="assets/projects/Athletik&Fitnessstudio_Reels.2026/Werbung_Sporttreff.mp4" muted loop autoplay playsinline loading="lazy"></video>
      </li>

    </ul>

  <script src="js/video-interaction.js?v=1"></script>
